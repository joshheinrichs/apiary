[package]
name = "dictate"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
nix = { version = "0.29", features = ["signal"] }
rustix = { version = "0.38", features = ["fs"] }
signal-hook = "0.3"
wayland-client = "0.31"
wayland-protocols-misc = { version = "0.3", features = ["client"] }
xdg = "2"

[build-dependencies]
bindgen = "0.71"
